server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:sqlite:pristanelaveriesmart.db}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.sqlite.JDBC}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: ${HIBERNATE_DIALECT:org.hibernate.community.dialect.SQLiteDialect}
        format_sql: true
  flyway:
    enabled: true
    locations: classpath*:db/migration

management:
  endpoints:
    web:
      exposure:
        include: "health,info"
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

logging:
  level:
    root: INFO
    org.hibernate.SQL: warn