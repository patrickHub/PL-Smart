version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: pristane-dotnet-postgres
    environment:
      POSTGRES_DB: pristane_laverie_smart
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pristane_dotnet_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pristane_laverie_smart"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    container_name: pristane-dotnet-migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=pristane_laverie_smart;Username=postgres;Password=postgres
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "dotnet ef migrations add AutoGeneratedMigration 
      --project src/PristaneLaverieSmart.Infrastructure 
      --startup-project src/PristaneLaverieSmart.API 
      --output-dir Persistence/Migrations && 
      dotnet ef database update 
      --project src/PristaneLaverieSmart.Infrastructure 
      --startup-project src/PristaneLaverieSmart.API"
    restart: "no"
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pristane-dotnet-api
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=pristane_laverie_smart;Username=postgres;Password=postgres
    ports:
      - "8081:8080"

volumes:
  pristane_dotnet_postgres_data: